// Convert between DB snake_case and JS camelCase
function fromDb(row) {
  return {
    id: row.id,
    title: row.title,
    description: row.description,
    platform: row.platform,
    status: row.status,
    priority: row.priority,
    dateReported: row.date_reported,
    stepsToReproduce: row.steps_to_reproduce,
    deviceInfo: row.device_info,
    appVersion: row.app_version,
    assignedTo: row.assigned_to,
    resolutionNotes: row.resolution_notes,
  };
}

function toDb(bug) {
  return {
    title: bug.title,
    description: bug.description,
    platform: bug.platform,
    status: bug.status,
    priority: bug.priority,
    date_reported: bug.dateReported,
    steps_to_reproduce: bug.stepsToReproduce,
    device_info: bug.deviceInfo,
    app_version: bug.appVersion,
    assigned_to: bug.assignedTo,
    resolution_notes: bug.resolutionNotes,
  };
}

function Badge({ children, bg, text }) {
  return (

function Toast({ message, type, onDone }) {
  useEffect(() => {
    const t = setTimeout(onDone, 3000);
    return () => clearTimeout(t);
  }, []);
  return <div className={`toast toast-${type}`}>{message}</div>;
}

function BugTracker() {
  const [bugs, setBugs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [search, setSearch] = useState("");
  const [filterPlatform, setFilterPlatform] = useState("All");
  const [filterStatus, setFilterStatus] = useState("All");
  const [filterPriority, setFilterPriority] = useState("All");
  const [sortField, setSortField] = useState("dateReported");
  const [sortDir, setSortDir] = useState("desc");
  const [showForm, setShowForm] = useState(false);
  const [editBug, setEditBug] = useState(null);
  const [viewBug, setViewBug] = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [toast, setToast] = useState(null);

  const showToast = (message, type = "success") => setToast({ message, type, key: Date.now() });

  // Fetch all bugs
  const fetchBugs = useCallback(async () => {
    const { data, error } = await supabase.from("bugs").select("*").order("created_at", { ascending: false });
    if (error) { showToast("Failed to load bugs: " + error.message, "error"); return; }
    setBugs(data.map(fromDb));
    setLoading(false);
  }, []);

  // Initial load + realtime subscription
  useEffect(() => {
    if (!isConfigured) { setLoading(false); return; }
    fetchBugs();

    const channel = supabase
      .channel("bugs-realtime")
      .on("postgres_changes", { event: "*", schema: "public", table: "bugs" }, (payload) => {
        if (payload.eventType === "INSERT") {
          setBugs((prev) => {
            if (prev.find(b => b.id === payload.new.id)) return prev;
            return [fromDb(payload.new), ...prev];
          });
        } else if (payload.eventType === "UPDATE") {
          const updated = fromDb(payload.new);
          setBugs((prev) => prev.map((b) => b.id === updated.id ? updated : b));
        } else if (payload.eventType === "DELETE") {
          setBugs((prev) => prev.filter((b) => b.id !== payload.old.id));
        }
      })
      .subscribe();

    return () => { supabase.removeChannel(channel); };
  }, [fetchBugs]);

  // Update viewBug when bugs change (for realtime updates)
  useEffect(() => {
    if (viewBug) {
      const updated = bugs.find(b => b.id === viewBug.id);
      if (updated) setViewBug(updated);
      else setViewBug(null);
    }
  }, [bugs]);

  const filtered = bugs
    .filter((b) => {
      if (filterPlatform !== "All" && b.platform !== filterPlatform) return false;
      if (filterStatus !== "All" && b.status !== filterStatus) return false;
      if (filterPriority !== "All" && b.priority !== filterPriority) return false;
      if (search) {
        const q = search.toLowerCase();
        return b.title.toLowerCase().includes(q) || b.description.toLowerCase().includes(q) || b.assignedTo.toLowerCase().includes(q) || String(b.id).includes(q);
      }
      return true;
    })
    .sort((a, b) => {
      let av = a[sortField], bv = b[sortField];
      if (sortField === "priority") { const o = { Critical: 0, High: 1, Medium: 2, Low: 3 }; av = o[av]; bv = o[bv]; }
      if (sortField === "status") { const o = { New: 0, "In Progress": 1, Resolved: 2, Closed: 3 }; av = o[av]; bv = o[bv]; }
      if (av < bv) return sortDir === "asc" ? -1 : 1;
      if (av > bv) return sortDir === "asc" ? 1 : -1;
      return 0;
    });

  const handleSort = (field) => {
    if (sortField === field) setSortDir((d) => d === "asc" ? "desc" : "asc");
    else { setSortField(field); setSortDir("asc"); }
  };

  const handleCreate = async (form) => {
    setSaving(true);
    const { error } = await supabase.from("bugs").insert(toDb(form));
    setSaving(false);
    if (error) { showToast("Failed to create bug: " + error.message, "error"); return; }
    showToast("Bug reported successfully");
    setShowForm(false);
  };

  const handleUpdate = async (form) => {
    setSaving(true);
    const { error } = await supabase.from("bugs").update(toDb(form)).eq("id", form.id);
    setSaving(false);
    if (error) { showToast("Failed to update bug: " + error.message, "error"); return; }
    showToast("Bug updated");
    setEditBug(null);
  };

  const handleDelete = async (id) => {
    const { error } = await supabase.from("bugs").delete().eq("id", id);
    if (error) { showToast("Failed to delete: " + error.message, "error"); return; }
    showToast("Bug deleted");
    setDeleteConfirm(null);
    if (viewBug && viewBug.id === id) setViewBug(null);
  };

  const handleStatusChange = async (id, status) => {
    const { error } = await supabase.from("bugs").update({ status }).eq("id", id);
    if (error) { showToast("Failed to update status: " + error.message, "error"); return; }
    showToast(`Status changed to ${status}`);
  };

  const stats = {
    total: bugs.length,
    open: bugs.filter((b) => b.status === "New" || b.status === "In Progress").length,
    critical: bugs.filter((b) => b.priority === "Critical" && b.status !== "Closed").length,
    resolved: bugs.filter((b) => b.status === "Resolved" || b.status === "Closed").length,
  };

  const SortArrow = ({ field }) => {
    if (sortField !== field) return <span style={{color:'#d1d5db',marginLeft:4}}>↕</span>;
    return <span style={{color:'#2563eb',marginLeft:4}}>{sortDir === "asc" ? "↑" : "↓"}</span>;
  };

  const thStyle = {textAlign:'left',fontSize:'0.7rem',fontWeight:600,color:'#6b7280',textTransform:'uppercase',letterSpacing:'0.05em',padding:'0.75rem 1rem',cursor:'pointer',whiteSpace:'nowrap',userSelect:'none'};
  const tdStyle = {padding:'0.75rem 1rem',fontSize:'0.875rem'};

  if (loading) {
    return (
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',backgroundColor:'#f9fafb'}}>
        <div style={{textAlign:'center'}}>
          <div className="spinner" style={{width:32,height:32,margin:'0 auto 1rem'}} />
          <p style={{color:'#6b7280',fontSize:'0.875rem'}}>Loading bugs...</p>
        </div>
      </div>
    );
  }

  return (
    <div style={{minHeight:'100vh',backgroundColor:'#f9fafb'}}>
      {toast && <Toast key={toast.key} message={toast.message} type={toast.type} onDone={() => setToast(null)} />}

      {/* Header */}
      <div style={{backgroundColor:'white',borderBottom:'1px solid #e5e7eb',position:'sticky',top:0,zIndex:30}}>
        <div style={{maxWidth:'80rem',margin:'0 auto',padding:'1rem 1.5rem'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{display:'flex',alignItems:'center',gap:'0.75rem'}}>
              <div style={{width:36,height:36,backgroundColor:'#2563eb',borderRadius:'0.5rem',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <svg width="18" height="18" fill="none" stroke="white" strokeWidth="2" viewBox="0 0 24 24"><path d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              </div>
              <div>
                <h1 style={{fontSize:'1.125rem',fontWeight:700,color:'#111827',margin:0}}>Bug Tracker</h1>
                <p style={{fontSize:'0.75rem',color:'#6b7280',margin:0}}>Flutter App — iOS · Android · Web</p>
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:'0.75rem'}}>
              <span style={{display:'inline-flex',alignItems:'center',gap:'0.375rem',fontSize:'0.75rem',color:'#059669'}}>
                <span style={{width:6,height:6,borderRadius:'50%',backgroundColor:'#059669',display:'inline-block'}} />
                Live
              </span>
              <button onClick={() => setShowForm(true)}
                style={{display:'flex',alignItems:'center',gap:'0.5rem',padding:'0.5rem 1rem',backgroundColor:'#2563eb',color:'white',fontSize:'0.875rem',fontWeight:500,borderRadius:'0.5rem',border:'none',cursor:'pointer',boxShadow:'0 1px 2px rgba(0,0,0,0.05)'}}>
                <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" d="M12 5v14m-7-7h14" /></svg>
                Report Bug
              </button>
            </div>
          </div>
        </div>
      </div>

      <div style={{maxWidth:'80rem',margin:'0 auto',padding:'1.5rem'}}>
        {/* Stats */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4, 1fr)',gap:'1rem',marginBottom:'1.5rem'}}>
          {[
            { label: "Total Bugs", value: stats.total, color: "#111827", bg: "white" },
            { label: "Open", value: stats.open, color: "#2563eb", bg: "#eff6ff" },
            { label: "Critical", value: stats.critical, color: "#dc2626", bg: "#fef2f2" },
            { label: "Resolved", value: stats.resolved, color: "#16a34a", bg: "#f0fdf4" },
          ].map((s) => (
            <div key={s.label} style={{backgroundColor:s.bg,borderRadius:'0.75rem',padding:'1rem',border:'1px solid #e5e7eb'}}>
              <p style={{fontSize:'0.7rem',fontWeight:500,color:'#6b7280',textTransform:'uppercase',letterSpacing:'0.05em',margin:0}}>{s.label}</p>
              <p style={{fontSize:'1.5rem',fontWeight:700,color:s.color,margin:'0.25rem 0 0'}}>{s.value}</p>
            </div>
          ))}
        </div>

        {/* Filters */}
        <div style={{backgroundColor:'white',borderRadius:'0.75rem',border:'1px solid #e5e7eb',padding:'1rem',marginBottom:'1.5rem'}}>
          <div style={{display:'flex',gap:'0.75rem',flexWrap:'wrap'}}>
            <input type="text" value={search} onChange={(e) => setSearch(e.target.value)}
              style={{flex:1,minWidth:'200px',padding:'0.5rem 0.75rem',border:'1px solid #d1d5db',borderRadius:'0.5rem',fontSize:'0.875rem',outline:'none'}}
              placeholder="Search bugs by title, description, assignee, or ID..." />
            <select value={filterPlatform} onChange={(e) => setFilterPlatform(e.target.value)}
              style={{padding:'0.5rem 0.75rem',border:'1px solid #d1d5db',borderRadius:'0.5rem',fontSize:'0.875rem',backgroundColor:'white'}}>
              <option value="All">All Platforms</option>
              {PLATFORMS.map((p) => <option key={p}>{p}</option>)}
            </select>
            <select value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)}
              style={{padding:'0.5rem 0.75rem',border:'1px solid #d1d5db',borderRadius:'0.5rem',fontSize:'0.875rem',backgroundColor:'white'}}>
              <option value="All">All Statuses</option>
              {STATUSES.map((s) => <option key={s}>{s}</option>)}
            </select>
            <select value={filterPriority} onChange={(e) => setFilterPriority(e.target.value)}
              style={{padding:'0.5rem 0.75rem',border:'1px solid #d1d5db',borderRadius:'0.5rem',fontSize:'0.875rem',backgroundColor:'white'}}>
              <option value="All">All Priorities</option>
              {PRIORITIES.map((p) => <option key={p}>{p}</option>)}
            </select>
          </div>
        </div>

        {/* Table */}
        <div style={{backgroundColor:'white',borderRadius:'0.75rem',border:'1px solid #e5e7eb',overflow:'hidden'}}>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead>
                <tr style={{backgroundColor:'#f9fafb',borderBottom:'1px solid #e5e7eb'}}>
                  <th style={thStyle} onClick={() => handleSort("id")}>ID <SortArrow field="id" /></th>
                  <th style={thStyle} onClick={() => handleSort("title")}>Title <SortArrow field="title" /></th>
                  <th style={thStyle} onClick={() => handleSort("platform")}>Platform <SortArrow field="platform" /></th>
                  <th style={thStyle} onClick={() => handleSort("priority")}>Priority <SortArrow field="priority" /></th>
                  <th style={thStyle} onClick={() => handleSort("status")}>Status <SortArrow field="status" /></th>
                  <th style={thStyle} onClick={() => handleSort("dateReported")}>Date <SortArrow field="dateReported" /></th>
                  <th style={{...thStyle,cursor:'default'}}>Assigned</th>
                  <th style={{...thStyle,textAlign:'right',cursor:'default'}}>Actions</th>
                </tr>
              </thead>
              <tbody>
                {filtered.length === 0 ? (
                  <tr><td colSpan={8} style={{padding:'3rem 1rem',textAlign:'center',color:'#9ca3af',fontSize:'0.875rem'}}>
                    {bugs.length === 0 ? "No bugs yet. Click 'Report Bug' to add one." : "No bugs match your filters."}
                  </td></tr>
                ) : (
                  filtered.map((bug) => {
                    const pc = PRIORITY_COLORS[bug.priority];
                    const sc = STATUS_COLORS[bug.status];
                    return (
                      <tr key={bug.id} style={{borderBottom:'1px solid #f3f4f6',cursor:'pointer'}}
                        onMouseEnter={(e) => e.currentTarget.style.backgroundColor='#f9fafb'}
                        onMouseLeave={(e) => e.currentTarget.style.backgroundColor='transparent'}
                        onClick={() => setViewBug(bug)}>
                        <td style={{...tdStyle,color:'#9ca3af',fontFamily:'monospace'}}>#{bug.id}</td>
                        <td style={tdStyle}>
                          <span style={{fontWeight:500,color:'#111827',maxWidth:'280px',display:'block',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{bug.title}</span>
                        </td>
                        <td style={tdStyle}><Badge bg="bg-gray-100" text="text-gray-700">{bug.platform}</Badge></td>
                        <td style={tdStyle}>
                          <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                            <span className={pc.dot} style={{width:8,height:8,borderRadius:'50%',display:'inline-block'}} />
                            <span className={pc.text} style={{fontSize:'0.75rem',fontWeight:500}}>{bug.priority}</span>
                          </div>
                        </td>
                        <td style={tdStyle}><Badge bg={sc.bg} text={sc.text}>{bug.status}</Badge></td>
                        <td style={{...tdStyle,color:'#6b7280'}}>{bug.dateReported}</td>
                        <td style={{...tdStyle,color:'#4b5563'}}>{bug.assignedTo || "\u2014"}</td>
                        <td style={{...tdStyle,textAlign:'right'}} onClick={(e) => e.stopPropagation()}>
                          <button onClick={() => setEditBug(bug)} title="Edit"
                            style={{padding:6,borderRadius:6,border:'none',background:'none',cursor:'pointer',color:'#9ca3af',marginRight:4}}>✏️</button>
                          <button onClick={() => setDeleteConfirm(bug.id)} title="Delete"
                            style={{padding:6,borderRadius:6,border:'none',background:'none',cursor:'pointer',color:'#9ca3af'}}>🗑️</button>
                        </td>
                      </tr>
                    );
                  })
                )}
              </tbody>
            </table>
          </div>
          <div style={{padding:'0.75rem 1rem',borderTop:'1px solid #f3f4f6',backgroundColor:'#f9fafb',fontSize:'0.75rem',color:'#6b7280'}}>
            Showing {filtered.length} of {bugs.length} bugs
          </div>
        </div>
      </div>

      {/* Modals */}
      <Modal isOpen={showForm} onClose={() => setShowForm(false)} title="Report New Bug">
        <BugForm onSave={handleCreate} onCancel={() => setShowForm(false)} saving={saving} />
      </Modal>

      <Modal isOpen={!!editBug} onClose={() => setEditBug(null)} title={editBug ? `Edit Bug #${editBug.id}` : ""}>
        {editBug && <BugForm bug={editBug} onSave={handleUpdate} onCancel={() => setEditBug(null)} saving={saving} />}
      </Modal>

      <Modal isOpen={!!viewBug} onClose={() => setViewBug(null)} title={viewBug ? `Bug #${viewBug.id}` : ""}>
        {viewBug && <BugDetail bug={viewBug} onClose={() => setViewBug(null)} onEdit={(b) => { setViewBug(null); setEditBug(b); }} onStatusChange={handleStatusChange} />}
      </Modal>

      <Modal isOpen={!!deleteConfirm} onClose={() => setDeleteConfirm(null)} title="Delete Bug" width="24rem">
        <div style={{textAlign:'center',display:'flex',flexDirection:'column',gap:'1rem',alignItems:'center'}}>
          <div style={{width:48,height:48,backgroundColor:'#fef2f2',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.5rem'}}>⚠️</div>
          <p style={{fontSize:'0.875rem',color:'#4b5563',margin:0}}>Are you sure you want to delete this bug? This action cannot be undone.</p>
          <div style={{display:'flex',justifyContent:'center',gap:'0.75rem'}}>
            <button onClick={() => setDeleteConfirm(null)} style={{padding:'0.5rem 1rem',fontSize:'0.875rem',fontWeight:500,color:'#374151',backgroundColor:'white',border:'1px solid #d1d5db',borderRadius:'0.5rem',cursor:'pointer'}}>Cancel</button>
            <button onClick={() => handleDelete(deleteConfirm)} style={{padding:'0.5rem 1rem',fontSize:'0.875rem',fontWeight:500,color:'white',backgroundColor:'#dc2626',border:'none',borderRadius:'0.5rem',cursor:'pointer'}}>Delete</button>
          </div>
        </div>
      </Modal>
    </div>
  );
}

function App() {
  if (!isConfigured) return <SetupScreen />;
  return <BugTracker />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
