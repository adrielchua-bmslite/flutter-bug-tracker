    .desktop-table { display: none !important; }

    /* Table: hide less important columns on very small screens (desktop fallback) */
    .table-col-assigned { display: none; }

    /* Modal padding reduction + safe area for bottom nav bar */
    .modal-content { padding: 0.75rem 1rem calc(0.75rem + env(safe-area-inset-bottom, 0px)) 1rem !important; }
    .modal-header { padding: 0.75rem 1rem !important; }

    /* Toast positioning for mobile */
    .toast { top: 0.5rem !important; right: 0.5rem !important; left: 0.5rem !important; width: auto !important; max-width: calc(100% - 1rem) !important; }

  @media (max-width: 768px) {
    /* Tablet adjustments */

  /* Default: show table, hide cards */

  .mobile-cards { display: none; }

  /* Bug card styles for mobile */
  .bug-card {
    background: rgba(255,255,255,0.75);

    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(0,0,0,0.06);

  .bug-card:active {
    background: rgba(255,255,255,0.85);

  }

  .bug-card-header {
    display: flex;

    overflow: hidden;

  .bug-card-badges {

  .bug-card-footer {
    display: flex;

    align-items: center;

    color: #6e6e73;
    gap: 10px;
  }

  .bug-card-actions {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 4px;
  }

  .bug-card-action-btn {
    padding: 6px;
    border-radius: 6px;

    background: rgba(0,0,0,0.04);
    cursor: pointer;
    color: #86868b;
    font-size: 16px;
    transition: all 0.2s ease;
  }

  .bug-card-action-btn:active {
    background: rgba(0,0,0,0.08);
  }
</style>

<script type="text/babel">

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const isConfigured = true;

const PLATFORMS = ["iOS", "Android", "Web", "Cross-platform"];
const PRIORITIES = ["Critical", "High", "Medium", "Low"];
const STATUSES = ["New", "In Progress", "Resolved", "Closed"];

const PRIORITY_COLORS = {
  Critical: { bg: "bg-red-50", text: "text-red-700", dot: "#ff3b30", style: { backgroundColor: "rgba(255,59,48,0.1)", color: "#ff3b30" } },
  High: { bg: "bg-amber-50", text: "text-amber-700", dot: "#ff9500", style: { backgroundColor: "rgba(255,149,0,0.1)", color: "#ff9500" } },
  Medium: { bg: "bg-blue-50", text: "text-blue-700", dot: "#007AFF", style: { backgroundColor: "rgba(0,122,255,0.1)", color: "#007AFF" } },
  Low: { bg: "bg-emerald-50", text: "text-emerald-700", dot: "#34c759", style: { backgroundColor: "rgba(52,199,89,0.1)", color: "#34c759" } },
};

const STATUS_COLORS = {
  New: { bg: "bg-blue-50", text: "text-blue-700", style: { backgroundColor: "rgba(0,122,255,0.1)", color: "#007AFF" } },
  "In Progress": { bg: "bg-purple-50", text: "text-purple-700", style: { backgroundColor: "rgba(175,82,222,0.1)", color: "#af52de" } },
  Resolved: { bg: "bg-emerald-50", text: "text-emerald-700", style: { backgroundColor: "rgba(52,199,89,0.1)", color: "#34c759" } },
  Closed: { bg: "bg-gray-50", text: "text-gray-600", style: { backgroundColor: "rgba(142,142,147,0.1)", color: "#8e8e93" } },
};

// Convert between DB snake_case and JS camelCase
function fromDb(row) {
  return {
    id: row.id,
    title: row.title,
    description: row.description,
    platform: row.platform,
    status: row.status,
    priority: row.priority,
    dateReported: row.date_reported,
    stepsToReproduce: row.steps_to_reproduce,
    deviceInfo: row.device_info,
    appVersion: row.app_version,
    assignedTo: row.assigned_to,
    resolutionNotes: row.resolution_notes,
    attachments: row.attachments || [],
  };
}

function toDb(bug) {
  return {
    title: bug.title,
    description: bug.description,
    platform: bug.platform,
    status: bug.status,
    priority: bug.priority,
    date_reported: bug.dateReported,
    steps_to_reproduce: bug.stepsToReproduce,
    device_info: bug.deviceInfo,
    app_version: bug.appVersion,
    assigned_to: bug.assignedTo,
    resolution_notes: bug.resolutionNotes,
    attachments: bug.attachments || [],
  };
}

function Badge({ children, bg, text, style }) {
  return (
    <span className={`inline-flex items-center px-3 py-1 rounded-full text-xs font-medium ${bg} ${text}`} style={{borderRadius:'999px',transition:'all 0.2s ease', ...style}}>
      {children}
    </span>
  );
}

function Toast({ message, type, onDone }) {
  useEffect(() => {
    const t = setTimeout(onDone, 3000);
    return () => clearTimeout(t);
  }, []);
  return <div className={`toast toast-${type}`}>{message}</div>;
}

function Modal({ isOpen, onClose, children, title, width }) {
  if (!isOpen) return null;
  return (
    <div style={{position:'fixed',inset:0,zIndex:50,display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem'}} onClick={onClose}>
      <div style={{position:'fixed',inset:0,backgroundColor:'rgba(0,0,0,0.3)',backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)'}} />
      <div style={{position:'relative',backgroundColor:'rgba(255,255,255,0.92)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',borderRadius:'16px',boxShadow:'0 25px 50px rgba(0,0,0,0.12)',border:'1px solid rgba(0,0,0,0.06)',width:'100%',maxWidth: width || '42rem',maxHeight:'90vh',overflowY:'auto'}} onClick={(e) => e.stopPropagation()}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'1.25rem 1.5rem',borderBottom:'1px solid rgba(0,0,0,0.06)',position:'sticky',top:0,backgroundColor:'rgba(255,255,255,0.8)',backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)',borderRadius:'16px 16px 0 0',zIndex:10}} className="modal-header">
          <h2 style={{fontSize:'1.125rem',fontWeight:600,color:'#1d1d1f',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{title}</h2>
          <button onClick={onClose} style={{padding:'4px',borderRadius:'8px',border:'none',background:'rgba(0,0,0,0.06)',cursor:'pointer',color:'#6e6e73',fontSize:'18px',flexShrink:0,transition:'all 0.2s ease'}}>✕</button>
        </div>
        <div style={{padding:'1.5rem 1.5rem'}} className="modal-content">{children}</div>
      </div>
    </div>
  );
}

function BugForm({ bug, onSave, onCancel, saving }) {
  const [form, setForm] = useState(
    bug || {
      title: "", description: "", platform: "iOS", status: "New", priority: "Medium",
      dateReported: new Date().toISOString().split("T")[0], stepsToReproduce: "",
      deviceInfo: "", appVersion: "", assignedTo: "", resolutionNotes: "", attachments: [],
    }
  );
  const [selectedFiles, setSelectedFiles] = useState([]);
  const [uploading, setUploading] = useState(false);
  const fileInputRef = useRef(null);

  const update = (field, value) => setForm((f) => ({ ...f, [field]: value }));
  const inputStyle = {width:'100%',padding:'0.75rem 1rem',border:'1px solid rgba(0,0,0,0.1)',borderRadius:'10px',fontSize:'0.875rem',outline:'none',boxSizing:'border-box',backgroundColor:'rgba(255,255,255,0.9)',color:'#1d1d1f',transition:'all 0.2s ease',backdropFilter:'blur(10px)',WebkitBackdropFilter:'blur(10px)'};
  const labelStyle = {display:'block',fontSize:'0.875rem',fontWeight:500,color:'#86868b',marginBottom:'0.375rem',lineHeight:'1.5'};

  const ALLOWED_IMAGE_TYPES = ['image/png', 'image/jpeg', 'image/gif'];
  const ALLOWED_VIDEO_TYPES = ['video/mp4', 'video/quicktime'];
  const MAX_FILE_SIZE = 20 * 1024 * 1024; // 20MB
  const MAX_FILES = 3;

  const isAllowedFile = (file) => {
    return (ALLOWED_IMAGE_TYPES.includes(file.type) || ALLOWED_VIDEO_TYPES.includes(file.type)) && file.size <= MAX_FILE_SIZE;
  };

  const getFileType = (file) => {
    if (ALLOWED_IMAGE_TYPES.includes(file.type)) return 'image';
    if (ALLOWED_VIDEO_TYPES.includes(file.type)) return 'video';
    return 'unknown';
  };

  const handleFileSelect = (e) => {
    const files = Array.from(e.target.files || []);
    const validFiles = files.filter((f, idx) => {
      if (!isAllowedFile(f)) return false;
      if (selectedFiles.length + idx >= MAX_FILES) return false;
      return true;
    }).slice(0, MAX_FILES - selectedFiles.length);

    const fileObjs = validFiles.map((file) => ({
      file,
      preview: getFileType(file) === 'image' ? URL.createObjectURL(file) : null,
      type: getFileType(file),
    }));

    setSelectedFiles((prev) => [...prev, ...fileObjs]);
    fileInputRef.current.value = '';
  };

  const removeFile = (idx) => {
    setSelectedFiles((prev) => {
      const newFiles = [...prev];
      if (newFiles[idx].preview) URL.revokeObjectURL(newFiles[idx].preview);
      newFiles.splice(idx, 1);
      return newFiles;
    });
  };

  const uploadFiles = async () => {
    if (selectedFiles.length === 0) return [];

    setUploading(true);
    const uploadedUrls = [];

    try {
      for (const fileObj of selectedFiles) {
        const timestamp = Date.now();
        const filename = `${timestamp}-${Math.random().toString(36).substr(2, 9)}-${fileObj.file.name}`;
        const { data, error } = await supabase.storage.from('bug-attachments').upload(filename, fileObj.file);

        if (error) {
          setUploading(false);
          return null;
        }

        const { data: urlData } = supabase.storage.from('bug-attachments').getPublicUrl(filename);
        uploadedUrls.push({ url: urlData.publicUrl, type: fileObj.type });
      }

      setSelectedFiles([]);
      setUploading(false);
      return uploadedUrls;
    } catch (err) {
      setUploading(false);
      return null;
    }
  };

  const handleSave = async () => {
    if (form.title.trim() && form.description.trim()) {
      const newUploads = await uploadFiles();
      if (newUploads === null) return;
      const allAttachments = [...(form.attachments || []), ...newUploads];
      onSave({ ...form, attachments: allAttachments });
    }
  };

  const removeAttachment = (idx) => {
    update('attachments', form.attachments.filter((_, i) => i !== idx));
  };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
      <div>
        <label style={labelStyle}>Title *</label>
        <input type="text" value={form.title} onChange={(e) => update("title", e.target.value)} style={inputStyle} placeholder="Brief summary of the bug" onFocus={(e) => e.target.style.borderColor='#007AFF'} onBlur={(e) => e.target.style.borderColor='rgba(0,0,0,0.1)'} />
      </div>
      <div>
        <label style={labelStyle}>Description *</label>
        <textarea value={form.description} onChange={(e) => update("description", e.target.value)} rows={3} style={{...inputStyle,resize:'none',minHeight:'6rem'}} placeholder="Detailed description of the issue" onFocus={(e) => e.target.style.borderColor='#007AFF'} onBlur={(e) => e.target.style.borderColor='rgba(0,0,0,0.1)'} />
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}} className="form-grid-mobile">
        <div>
          <label style={labelStyle}>Platform</label>
          <select value={form.platform} onChange={(e) => update("platform", e.target.value)} style={{...inputStyle}} onFocus={(e) => e.target.style.borderColor='#007AFF'} onBlur={(e) => e.target.style.borderColor='rgba(0,0,0,0.1)'}>
            {PLATFORMS.map((p) => <option key={p}>{p}</option>)}
          </select>
        </div>
        <div>
          <label style={labelStyle}>Priority</label>
          <select value={form.priority} onChange={(e) => update("priority", e.target.value)} style={{...inputStyle}} onFocus={(e) => e.target.style.borderColor='#007AFF'} onBlur={(e) => e.target.style.borderColor='rgba(0,0,0,0.1)'}>
            {PRIORITIES.map((p) => <option key={p}>{p}</option>)}
          </select>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}} className="form-grid-mobile">
        <div>
          <label style={labelStyle}>Status</label>
          <select value={form.status} onChange={(e) => update("status", e.target.value)} style={{...inputStyle}} onFocus={(e) => e.target.style.borderColor='#007AFF'} onBlur={(e) => e.target.style.borderColor='rgba(0,0,0,0.1)'}>
            {STATUSES.map((s) => <option key={s}>{s}</option>)}
          </select>
        </div>
        <div>
          <label style={labelStyle}>Date Reported</label>
          <input type="date" value={form.dateReported} onChange={(e) => update("dateReported", e.target.value)} style={inputStyle} onFocus={(e) => e.target.style.borderColor='#007AFF'} onBlur={(e) => e.target.style.borderColor='rgba(0,0,0,0.1)'} />
        </div>
      </div>
      <div>
        <label style={labelStyle}>Steps to Reproduce</label>
        <textarea value={form.stepsToReproduce} onChange={(e) => update("stepsToReproduce", e.target.value)} rows={3} style={{...inputStyle,resize:'none',fontFamily:'monospace',minHeight:'6rem'}} placeholder={"1. Open app\n2. Tap on...\n3. Observe..."} onFocus={(e) => e.target.style.borderColor='#007AFF'} onBlur={(e) => e.target.style.borderColor='rgba(0,0,0,0.1)'} />
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}} className="form-grid-mobile">
        <div>
          <label style={labelStyle}>Device Info</label>
          <input type="text" value={form.deviceInfo} onChange={(e) => update("deviceInfo", e.target.value)} style={inputStyle} placeholder="e.g. iPhone 14, iOS 17.4" onFocus={(e) => e.target.style.borderColor='#007AFF'} onBlur={(e) => e.target.style.borderColor='rgba(0,0,0,0.1)'} />
        </div>
        <div>
          <label style={labelStyle}>App Version</label>
          <input type="text" value={form.appVersion} onChange={(e) => update("appVersion", e.target.value)} style={inputStyle} placeholder="e.g. 2.3.1" onFocus={(e) => e.target.style.borderColor='#007AFF'} onBlur={(e) => e.target.style.borderColor='rgba(0,0,0,0.1)'} />
        </div>
      </div>
      <div>
        <label style={labelStyle}>Assigned To</label>
        <input type="text" value={form.assignedTo} onChange={(e) => update("assignedTo", e.target.value)} style={inputStyle} placeholder="Developer name" onFocus={(e) => e.target.style.borderColor='#007AFF'} onBlur={(e) => e.target.style.borderColor='rgba(0,0,0,0.1)'} />
      </div>
      <div>
        <label style={labelStyle}>Resolution Notes</label>
        <textarea value={form.resolutionNotes} onChange={(e) => update("resolutionNotes", e.target.value)} rows={2} style={{...inputStyle,resize:'none',minHeight:'4rem'}} placeholder="How was this resolved? (fill in when closing)" onFocus={(e) => e.target.style.borderColor='#007AFF'} onBlur={(e) => e.target.style.borderColor='rgba(0,0,0,0.1)'} />
      </div>

      <div>
        <label style={labelStyle}>Attachments (Images & Videos)</label>
        <div style={{fontSize:'0.8rem',color:'#86868b',marginBottom:'0.5rem'}}>
          Up to {MAX_FILES} files • Max 20MB each • Images (PNG, JPG, GIF) & Videos (MP4, MOV)
        </div>

        {selectedFiles.length > 0 && (
          <div style={{marginBottom:'0.75rem',padding:'0.75rem',backgroundColor:'rgba(255,255,255,0.75)',borderRadius:'0.5rem',border:'1px solid rgba(0,0,0,0.06)'}}>
            <div style={{fontSize:'0.75rem',fontWeight:600,color:'#6e6e73',marginBottom:'0.5rem',textTransform:'uppercase'}}>
              Pending Upload ({selectedFiles.length})
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(80px, 1fr))',gap:'0.5rem'}}>
              {selectedFiles.map((fileObj, idx) => (
                <div key={idx} style={{position:'relative',borderRadius:'0.375rem',overflow:'hidden',backgroundColor:'#f2f2f7',aspectRatio:'1'}}>
                  {fileObj.preview ? (
                    <img src={fileObj.preview} style={{width:'100%',height:'100%',objectFit:'cover'}} />
                  ) : (
                    <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.5rem'}}>🎬</div>
                  )}
                  <button onClick={() => removeFile(idx)} style={{position:'absolute',top:'2px',right:'2px',width:20,height:20,borderRadius:'50%',backgroundColor:'rgba(0,0,0,0.6)',color:'white',border:'none',cursor:'pointer',fontSize:'12px',padding:0,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
                </div>
              ))}
            </div>
          </div>
        )}

        {form.attachments.length > 0 && (
          <div style={{marginBottom:'0.75rem',padding:'0.75rem',backgroundColor:'rgba(34,197,94,0.1)',borderRadius:'0.5rem',border:'1px solid rgba(34,197,94,0.15)'}}>
            <div style={{fontSize:'0.75rem',fontWeight:600,color:'#34c759',marginBottom:'0.5rem',textTransform:'uppercase'}}>
              Uploaded ({form.attachments.length})
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(80px, 1fr))',gap:'0.5rem'}}>
              {form.attachments.map((att, idx) => (
                <div key={idx} style={{position:'relative',borderRadius:'0.375rem',overflow:'hidden',backgroundColor:'#f2f2f7',aspectRatio:'1'}}>
                  {att.type === 'image' ? (

function BugTracker() {
  const [bugs, setBugs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [search, setSearch] = useState("");
  const [filterPlatform, setFilterPlatform] = useState("All");
  const [filterStatus, setFilterStatus] = useState("All");
  const [filterPriority, setFilterPriority] = useState("All");
  const [sortField, setSortField] = useState("dateReported");
  const [sortDir, setSortDir] = useState("desc");
  const [showForm, setShowForm] = useState(false);
  const [editBug, setEditBug] = useState(null);
  const [viewBug, setViewBug] = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [toast, setToast] = useState(null);

  const showToast = (message, type = "success") => setToast({ message, type, key: Date.now() });

  // Fetch all bugs
  const fetchBugs = useCallback(async () => {
    const { data, error } = await supabase.from("bugs").select("*").order("created_at", { ascending: false });
    if (error) { showToast("Failed to load bugs: " + error.message, "error"); return; }
    setBugs(data.map(fromDb));
    setLoading(false);
  }, []);

  // Initial load + realtime subscription
  useEffect(() => {
    if (!isConfigured) { setLoading(false); return; }
    fetchBugs();

    const channel = supabase
      .channel("bugs-realtime")
      .on("postgres_changes", { event: "*", schema: "public", table: "bugs" }, (payload) => {
        if (payload.eventType === "INSERT") {
          setBugs((prev) => {
            if (prev.find(b => b.id === payload.new.id)) return prev;
            return [fromDb(payload.new), ...prev];
          });
        } else if (payload.eventType === "UPDATE") {
          const updated = fromDb(payload.new);
          setBugs((prev) => prev.map((b) => b.id === updated.id ? updated : b));
        } else if (payload.eventType === "DELETE") {
          setBugs((prev) => prev.filter((b) => b.id !== payload.old.id));
        }
      })
      .subscribe();

    return () => { supabase.removeChannel(channel); };
  }, [fetchBugs]);

  // Update viewBug when bugs change (for realtime updates)
  useEffect(() => {
    if (viewBug) {
      const updated = bugs.find(b => b.id === viewBug.id);
      if (updated) setViewBug(updated);
      else setViewBug(null);
    }
  }, [bugs]);

  const filtered = bugs
    .filter((b) => {
      if (filterPlatform !== "All" && b.platform !== filterPlatform) return false;
      if (filterStatus !== "All" && b.status !== filterStatus) return false;
      if (filterPriority !== "All" && b.priority !== filterPriority) return false;
      if (search) {
        const q = search.toLowerCase();
        return b.title.toLowerCase().includes(q) || b.description.toLowerCase().includes(q) || b.assignedTo.toLowerCase().includes(q) || String(b.id).includes(q);
      }
      return true;
    })
    .sort((a, b) => {
      let av = a[sortField], bv = b[sortField];
      if (sortField === "priority") { const o = { Critical: 0, High: 1, Medium: 2, Low: 3 }; av = o[av]; bv = o[bv]; }
      if (sortField === "status") { const o = { New: 0, "In Progress": 1, Resolved: 2, Closed: 3 }; av = o[av]; bv = o[bv]; }
      if (av < bv) return sortDir === "asc" ? -1 : 1;
      if (av > bv) return sortDir === "asc" ? 1 : -1;
      return 0;
    });

  const handleSort = (field) => {
    if (sortField === field) setSortDir((d) => d === "asc" ? "desc" : "asc");
    else { setSortField(field); setSortDir("asc"); }
  };

  const handleCreate = async (form) => {
    setSaving(true);
    const { error } = await supabase.from("bugs").insert(toDb(form));
    setSaving(false);
    if (error) { showToast("Failed to create bug: " + error.message, "error"); return; }
    showToast("Bug reported successfully");
    setShowForm(false);
  };

  const handleUpdate = async (form) => {
    setSaving(true);
    const { error } = await supabase.from("bugs").update(toDb(form)).eq("id", form.id);
    setSaving(false);
    if (error) { showToast("Failed to update bug: " + error.message, "error"); return; }
    showToast("Bug updated");
    setEditBug(null);
  };

  const handleDelete = async (id) => {
    const { error } = await supabase.from("bugs").delete().eq("id", id);
    if (error) { showToast("Failed to delete: " + error.message, "error"); return; }
    showToast("Bug deleted");
    setDeleteConfirm(null);
    if (viewBug && viewBug.id === id) setViewBug(null);
  };

  const handleStatusChange = async (id, status) => {
    const { error } = await supabase.from("bugs").update({ status }).eq("id", id);
    if (error) { showToast("Failed to update status: " + error.message, "error"); return; }
    showToast(`Status changed to ${status}`);
  };

  const stats = {
    total: bugs.length,
    open: bugs.filter((b) => b.status === "New" || b.status === "In Progress").length,
    critical: bugs.filter((b) => b.priority === "Critical" && b.status !== "Closed").length,
    resolved: bugs.filter((b) => b.status === "Resolved" || b.status === "Closed").length,
  };

  const SortArrow = ({ field }) => {
    if (sortField !== field) return <span style={{color:'#c7c7cc',marginLeft:4}}>↕</span>;
    return <span style={{color:'#007AFF',marginLeft:4}}>{sortDir === "asc" ? "↑" : "↓"}</span>;
  };

  const thStyle = {textAlign:'left',fontSize:'0.7rem',fontWeight:600,color:'#6e6e73',textTransform:'uppercase',letterSpacing:'0.05em',padding:'0.75rem 1rem',cursor:'pointer',whiteSpace:'nowrap',userSelect:'none'};

    return (
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div style={{textAlign:'center'}}>
          <div className="spinner" style={{width:32,height:32,margin:'0 auto 1rem'}} />
          <p style={{color:'#6e6e73',fontSize:'0.875rem'}}>Loading bugs...</p>
        </div>
      </div>
    );
  }

  return (
    <div style={{minHeight:'100vh'}}>
      {toast && <Toast key={toast.key} message={toast.message} type={toast.type} onDone={() => setToast(null)} />}

      {/* Header */}
      <div style={{backgroundColor:'rgba(255,255,255,0.8)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',borderBottom:'1px solid rgba(0,0,0,0.06)',position:'sticky',top:0,zIndex:30,boxShadow:'0 1px 3px rgba(0,0,0,0.05)'}}>
        <div style={{maxWidth:'80rem',margin:'0 auto',padding:'1rem 1.5rem'}} className="header-container">

              <div style={{width:36,height:36,backgroundColor:'#007AFF',borderRadius:'12px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <svg width="18" height="18" fill="none" stroke="white" strokeWidth="2" viewBox="0 0 24 24"><path d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              </div>
              <div style={{minWidth:0}}>
                <h1 style={{fontSize:'1.125rem',fontWeight:700,color:'#1d1d1f',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>Bug Tracker</h1>

              placeholder="Search bugs by title, description, assignee, or ID..." className="filter-search" onFocus={(e) => e.target.style.borderColor='#007AFF'} onBlur={(e) => e.target.style.borderColor='rgba(0,0,0,0.1)'} />
            <select value={filterPlatform} onChange={(e) => setFilterPlatform(e.target.value)}
              style={{padding:'0.75rem 1rem',border:'1px solid rgba(0,0,0,0.1)',borderRadius:'10px',fontSize:'0.875rem',backgroundColor:'rgba(255,255,255,0.9)',color:'#1d1d1f',transition:'all 0.2s ease',backdropFilter:'blur(10px)',WebkitBackdropFilter:'blur(10px)'}} className="filter-select" onFocus={(e) => e.target.style.borderColor='#007AFF'} onBlur={(e) => e.target.style.borderColor='rgba(0,0,0,0.1)'}>
              <option value="All">All Platforms</option>
              {PLATFORMS.map((p) => <option key={p}>{p}</option>)}
            </select>
            <select value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)}
              style={{padding:'0.75rem 1rem',border:'1px solid rgba(0,0,0,0.1)',borderRadius:'10px',fontSize:'0.875rem',backgroundColor:'rgba(255,255,255,0.9)',color:'#1d1d1f',transition:'all 0.2s ease',backdropFilter:'blur(10px)',WebkitBackdropFilter:'blur(10px)'}} className="filter-select" onFocus={(e) => e.target.style.borderColor='#007AFF'} onBlur={(e) => e.target.style.borderColor='rgba(0,0,0,0.1)'}>
              <option value="All">All Statuses</option>
              {STATUSES.map((s) => <option key={s}>{s}</option>)}
            </select>
            <select value={filterPriority} onChange={(e) => setFilterPriority(e.target.value)}
              style={{padding:'0.75rem 1rem',border:'1px solid rgba(0,0,0,0.1)',borderRadius:'10px',fontSize:'0.875rem',backgroundColor:'rgba(255,255,255,0.9)',color:'#1d1d1f',transition:'all 0.2s ease',backdropFilter:'blur(10px)',WebkitBackdropFilter:'blur(10px)'}} className="filter-select" onFocus={(e) => e.target.style.borderColor='#007AFF'} onBlur={(e) => e.target.style.borderColor='rgba(0,0,0,0.1)'}>
              <option value="All">All Priorities</option>
              {PRIORITIES.map((p) => <option key={p}>{p}</option>)}
            </select>
          </div>
        </div>

        {/* Desktop Table */}
        <div className="desktop-table" style={{backgroundColor:'rgba(255,255,255,0.75)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',borderRadius:'16px',border:'1px solid rgba(0,0,0,0.06)',overflow:'hidden',boxShadow:'0 2px 12px rgba(0,0,0,0.04)'}}>
          <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead>
                <tr style={{backgroundColor:'rgba(0,0,0,0.02)',borderBottom:'1px solid rgba(0,0,0,0.04)'}} className="table-row">
                  <th style={thStyle} onClick={() => handleSort("id")}>ID <SortArrow field="id" /></th>
                  <th style={thStyle} onClick={() => handleSort("title")}>Title <SortArrow field="title" /></th>
                  <th style={thStyle} onClick={() => handleSort("platform")}>Platform <SortArrow field="platform" /></th>
                  <th style={thStyle} onClick={() => handleSort("priority")}>Priority <SortArrow field="priority" /></th>
                  <th style={thStyle} onClick={() => handleSort("status")}>Status <SortArrow field="status" /></th>
                  <th style={thStyle} onClick={() => handleSort("dateReported")} className="table-col-date">Date <SortArrow field="dateReported" /></th>
                  <th style={{...thStyle,cursor:'default'}} className="table-col-assigned">Assigned</th>
                  <th style={{...thStyle,textAlign:'right',cursor:'default'}}>Actions</th>
                </tr>
              </thead>
              <tbody>
                {filtered.length === 0 ? (
                  <tr><td colSpan={8} style={{padding:'3rem 1rem',textAlign:'center',color:'#86868b',fontSize:'0.875rem'}}>
                    {bugs.length === 0 ? "No bugs yet. Click 'Report Bug' to add one." : "No bugs match your filters."}
                  </td></tr>
                ) : (
                  filtered.map((bug) => {
                    const pc = PRIORITY_COLORS[bug.priority];
                    const sc = STATUS_COLORS[bug.status];
                    return (
                      <tr key={bug.id} style={{borderBottom:'1px solid rgba(0,0,0,0.04)',cursor:'pointer',transition:'all 0.2s ease'}} className="table-row"
                        onMouseEnter={(e) => e.currentTarget.style.backgroundColor='rgba(0,122,255,0.04)'}
                        onMouseLeave={(e) => e.currentTarget.style.backgroundColor='transparent'}
                        onClick={() => setViewBug(bug)}>
                        <td style={{...tdStyle,color:'#86868b',fontFamily:'monospace'}}>#{bug.id}</td>
                        <td style={tdStyle}>
                          <span style={{fontWeight:500,color:'#1d1d1f',maxWidth:'280px',display:'block',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{bug.title}</span>
                        </td>
                        <td style={tdStyle}><Badge style={{backgroundColor:'rgba(255,255,255,0.75)',color:'#1d1d1f'}}>{bug.platform}</Badge></td>
                        <td style={tdStyle}>
                          <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                            <span style={{width:8,height:8,borderRadius:'50%',display:'inline-block',backgroundColor:pc.dot}} />
                            <span style={{fontSize:'0.75rem',fontWeight:500,color:pc.style.color}}>{bug.priority}</span>
                          </div>
                        </td>
                        <td style={tdStyle}><Badge style={sc.style}>{bug.status}</Badge></td>
                        <td style={{...tdStyle,color:'#6e6e73'}} className="table-col-date">{bug.dateReported}</td>
                        <td style={{...tdStyle,color:'#6e6e73'}} className="table-col-assigned">{bug.assignedTo || "\u2014"}</td>
                        <td style={{...tdStyle,textAlign:'right'}} onClick={(e) => e.stopPropagation()}>
                          <button onClick={() => setEditBug(bug)} title="Edit"
                            style={{padding:6,borderRadius:6,border:'none',background:'none',cursor:'pointer',color:'#86868b',marginRight:4}}>✏️</button>
                          <button onClick={() => setDeleteConfirm(bug.id)} title="Delete"
                            style={{padding:6,borderRadius:6,border:'none',background:'none',cursor:'pointer',color:'#86868b'}}>🗑️</button>
                        </td>
                      </tr>
                    );
                  })
                )}
              </tbody>
            </table>
          </div>
          <div style={{padding:'0.75rem 1rem',borderTop:'1px solid rgba(0,0,0,0.06)',backgroundColor:'rgba(255,255,255,0.5)',fontSize:'0.75rem',color:'#6e6e73'}}>
            Showing {filtered.length} of {bugs.length} bugs
          </div>
        </div>

        {/* Mobile Card List */}
        <div className="mobile-cards">
          {filtered.length === 0 ? (
            <div style={{padding:'3rem 1rem',textAlign:'center',color:'#86868b',fontSize:'0.875rem'}}>
              {bugs.length === 0 ? "No bugs yet. Click 'Report Bug' to add one." : "No bugs match your filters."}
            </div>
          ) : (
            filtered.map((bug) => (
              <BugCard key={bug.id} bug={bug} onView={setViewBug} onEdit={setEditBug} onDelete={setDeleteConfirm} />
            ))
          )}
          <div style={{padding:'0.75rem 1rem',fontSize:'0.75rem',color:'#6e6e73'}}>
            Showing {filtered.length} of {bugs.length} bugs
          </div>
        </div>
      </div>

      {/* Modals */}
      <Modal isOpen={showForm} onClose={() => setShowForm(false)} title="Report New Bug">
        <BugForm onSave={handleCreate} onCancel={() => setShowForm(false)} saving={saving} />
      </Modal>

      <Modal isOpen={!!editBug} onClose={() => setEditBug(null)} title={editBug ? `Edit Bug #${editBug.id}` : ""}>
        {editBug && <BugForm bug={editBug} onSave={handleUpdate} onCancel={() => setEditBug(null)} saving={saving} />}
      </Modal>

      <Modal isOpen={!!viewBug} onClose={() => setViewBug(null)} title={viewBug ? `Bug #${viewBug.id}` : ""}>
        {viewBug && <BugDetail bug={viewBug} onClose={() => setViewBug(null)} onEdit={(b) => { setViewBug(null); setEditBug(b); }} onStatusChange={handleStatusChange} />}
      </Modal>

      <Modal isOpen={!!deleteConfirm} onClose={() => setDeleteConfirm(null)} title="Delete Bug" width="24rem">
        <div style={{textAlign:'center',display:'flex',flexDirection:'column',gap:'1rem',alignItems:'center'}}>
          <div style={{width:48,height:48,backgroundColor:'rgba(239,68,68,0.15)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.5rem'}}>⚠️</div>
          <p style={{fontSize:'0.875rem',color:'#6e6e73',margin:0}}>Are you sure you want to delete this bug? This action cannot be undone.</p>
          <div style={{display:'flex',justifyContent:'center',gap:'0.75rem'}}>
            <button onClick={() => setDeleteConfirm(null)} style={{padding:'0.625rem 1.25rem',fontSize:'0.875rem',fontWeight:500,color:'#1d1d1f',backgroundColor:'rgba(255,255,255,0.75)',border:'1px solid rgba(0,0,0,0.1)',borderRadius:'10px',cursor:'pointer',transition:'all 0.2s ease'}}>Cancel</button>
            <button onClick={() => handleDelete(deleteConfirm)} style={{padding:'0.625rem 1.25rem',fontSize:'0.875rem',fontWeight:500,color:'white',backgroundColor:'#ff3b30',border:'none',borderRadius:'10px',cursor:'pointer',transition:'all 0.2s ease'}}>Delete</button>
          </div>
        </div>
      </Modal>
    </div>
  );
}

function App() {
  if (!isConfigured) return <SetupScreen />;
  return <BugTracker />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
